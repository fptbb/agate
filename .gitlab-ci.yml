workflow:
    rules:
        - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
          when: never
        - if: "$CI_COMMIT_TAG"
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"
        - if: "$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS"
          when: never
        - if: "$CI_COMMIT_BRANCH"
        # Daily Builds
        - if: $CI_PIPELINE_SOURCE == "schedule"

default:
    artifacts:
        expire_in: 1 day

variables:
    IMAGE_NAME: "agate"
    UPSTREAM_IMAGE: "ublue-os/bazzite-dx-nvidia"
    UPSTREAM_REGISTRY: "ghcr.io"


.python-job:
    image: python:3-alpine
    before_script:
        - pip install requests

stages:
    - check
    - build
    - publish
    - deploy
    - cleanup

check-update:
    extends: .python-job
    stage: check
    rules:
        - if: $CI_PIPELINE_SOURCE == "schedule"
    artifacts:
        expire_in: 1 day
        reports:
            dotenv: build.env
    script:
        - python3 -m scripts.gitlab.check_update

build-image:
    stage: build
    needs:
        - job: check-update
          artifacts: true
          optional: true
    rules:
        - when: on_success
    tags:
        - saas-linux-2xlarge-amd64
    image:
        name: ghcr.io/blue-build/cli
        entrypoint: [""]
    services:
        - docker:dind
    parallel:
        matrix:
            - RECIPE:
                  - recipe.yml
    variables:
        # Setup a secure connection with docker-in-docker service
        # https://docs.gitlab.com/ee/ci/docker/using_docker_build.html
        DOCKER_HOST: tcp://docker:2376
        DOCKER_TLS_CERTDIR: /certs
        DOCKER_TLS_VERIFY: 1
        DOCKER_CERT_PATH: $DOCKER_TLS_CERTDIR/client
    before_script:
        # On scheduled pipelines, skip build if no update was found
        - |
            if [ "$CI_PIPELINE_SOURCE" = "schedule" ] && [ "$FORCE_BUILD" != "true" ]; then
              echo "No update found. Skipping build."
              exit 0
            fi
        # Pulls secure files into the build
        - curl --silent "https://gitlab.com/gitlab-org/incubation-engineering/mobile-devops/download-secure-files/-/raw/main/installer" | bash
        - export COSIGN_PRIVATE_KEY=$(cat .secure_files/cosign.key)
        - docker login $BB_REGISTRY -u $BB_USERNAME -p $BB_PASSWORD
    script:
        - sleep 5 # Wait a bit for the docker-in-docker service to start
        - echo "Pushing to $BB_REGISTRY/$BB_REGISTRY_NAMESPACE/$IMAGE_NAME"
        - bluebuild build --verbose --cache-layers --compression-format zstd --push ./recipes/$RECIPE

publish-metadata:
    stage: publish
    image: alpine:latest
    variables:
        REGCTL_VERSION: v0.5.0
        DEST_REPO: "$BB_REGISTRY/$BB_REGISTRY_NAMESPACE/$IMAGE_NAME:artifacthub.io"
    needs:
        - job: check-update
          artifacts: true
          optional: true
        - job: build-image
    rules:
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
        - if: $CI_COMMIT_TAG
    before_script:
        # On scheduled pipelines, skip if no update was found
        - |
            if [ "$CI_PIPELINE_SOURCE" = "schedule" ] && [ "$FORCE_BUILD" != "true" ]; then
              echo "No update found. Skipping publish."
              exit 0
            fi
        - apk add --no-cache curl
        - curl -L https://github.com/regclient/regclient/releases/download/${REGCTL_VERSION}/regctl-linux-amd64 > /usr/local/bin/regctl
        - chmod +x /usr/local/bin/regctl
        - echo "$BB_PASSWORD" | regctl registry login $BB_REGISTRY -u "$BB_USERNAME" --pass-stdin
    script:
        - |
            if [ ! -f "artifacthub-repo.yml" ]; then
              echo "Error: artifacthub-repo.yml not found in repository root."
              exit 1
            fi
        - |
            regctl artifact put \
              --format '{{ .Manifest.GetDescriptor.Digest }}' \
              --artifact-type application/vnd.cncf.artifacthub.config.v1+yaml \
              -f artifacthub-repo.yml \
              --file-media-type "application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml" \
              $DEST_REPO

cleanup-old-tags:
    extends: .python-job
    stage: cleanup
    needs:
        - job: check-update
          artifacts: true
          optional: true
        - job: build-image
    rules:
        - when: on_success
    variables:
        MAX_AGE_DAYS: "7"
        MAX_KEEP: "5"
        DRY_RUN: "false"
    script:
        # On scheduled pipelines, skip if no update was found
        - |
            if [ "$CI_PIPELINE_SOURCE" = "schedule" ] && [ "$FORCE_BUILD" != "true" ]; then
              echo "No update found. Skipping cleanup."
              exit 0
            fi
        - python3 -m scripts.gitlab.cleanup_old_tags
