# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: systemd
    system:
      masked:
        # disables handheld and living room specific daemons on desktop
        - hhd.service
        - jupiter-biosupdate.service
        - jupiter-controller-update.service
        - bazzite-tdpfix.service
        - pipewire-workaround.service
        - wireplumber-workaround.service
        - cec-onboot.service
        - cec-onpoweroff.service
        - cec-onsleep.service
        - ds-inhibit.service
        - raid-check.timer
        # hardware mismatches and legacy raid
        - thermald.service
        - mdmonitor.service
        # virtual machine guest tools
        - vmtoolsd.service
        - vgauthd.service
        - vboxservice.service
        # enterprise network storage (nfs/iscsi)
        - nfs-server.service
        - nfs-mountd.service
        - nfs-idmapd.service
        - nfsdcld.service
        - rpcbind.service
        - rpc-statd.service
        - iscsid.service
        - iscsi-init.service
        - iscsi-onboot.service
        - iscsi-shutdown.service
        - iscsiuio.service
        - iscsid.socket
        - iscsiuio.socket
        - sssd-kcm.socket
        # enterprise identity management
        - sssd.service
        - sssd-kcm.service
        # unused storage and package manager daemons
        - lvm2-lvmpolld.socket
        # local virtual machine hosting suite
        - libvirtd.service
        - libvirtd.socket
        - virtinterfaced.socket
        - virtlockd.socket
        - virtlogd.socket
        - virtlxcd.socket
        - virtnetworkd.socket
        - virtnodedevd.socket
        - virtnwfilterd.socket
        - virtproxyd.socket
        - virtqemud.socket
        - virtsecretd.socket
        - virtstoraged.socket
        - virtvboxd.socket
        # others
        - switcheroo-control.service
        - NetworkManager-wait-online.service
        - rpm-ostree-countme.timer
        - dnf-makecache.timer
        - input-remapper.service
  - type: dnf
    remove:
      packages:
      # Remove packages that are not needed on a desktop system, like language packs, documentation, and hardware support for devices that are not present.
        - fcitx5-chinese-addons
        - fcitx5-mozc
        - fcitx5-hangul
        - fcitx5-chewing
        - ibus-anthy
        - ibus-pinyin
        - ibus-hangul
        - ibus-m17n
        - anthy-unicode
        - libthai
        - libhangul
      auto-remove: false