# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: systemd
    system:
      masked:
        # disables handheld and living room specific daemons on desktop
        - hhd.service
        - jupiter-biosupdate.service
        - jupiter-controller-update.service
        - bazzite-tdpfix.service
        - pipewire-workaround.service
        - wireplumber-workaround.service
        - cec-onboot.service
        - cec-onpoweroff.service
        - cec-onsleep.service
        - ds-inhibit.service
        - raid-check.timer
        # hardware mismatches and legacy raid
        - thermald.service
        - mdmonitor.service
        # virtual machine guest tools
        - vmtoolsd.service
        - vgauthd.service
        - vboxservice.service
        # enterprise network storage (nfs/iscsi)
        - nfs-server.service
        - nfs-mountd.service
        - nfs-idmapd.service
        - nfsdcld.service
        - rpcbind.service
        - rpc-statd.service
        - iscsid.service
        - iscsi-init.service
        - iscsi-onboot.service
        - iscsi-shutdown.service
        - iscsiuio.service
        - iscsid.socket
        - iscsiuio.socket
        - sssd-kcm.socket
        # enterprise identity management
        - sssd.service
        - sssd-kcm.service
        # unused storage and package manager daemons
        - lvm2-lvmpolld.socket
        # local virtual machine hosting suite
        - libvirtd.service
        - libvirtd.socket
        - virtinterfaced.socket
        - virtlockd.socket
        - virtlogd.socket
        - virtlxcd.socket
        - virtnetworkd.socket
        - virtnodedevd.socket
        - virtnwfilterd.socket
        - virtproxyd.socket
        - virtqemud.socket
        - virtsecretd.socket
        - virtstoraged.socket
        - virtvboxd.socket
        # others
        - switcheroo-control.service
        - NetworkManager-wait-online.service
        - rpm-ostree-countme.timer
        - dnf-makecache.timer
        - input-remapper.service
  - type: dnf
    remove:
      packages:
      # Remove packages that are not needed on a desktop system, like language packs and specific input method engines.
      # Note: DO NOT remove libthai or libhangul as they are hard dependencies for pango/text rendering.
        - fcitx5-chinese-addons
        - fcitx5-mozc
        - fcitx5-hangul
        - fcitx5-chewing
        - ibus-anthy
        - ibus-pinyin
        - ibus-hangul
        - ibus-m17n
        - anthy-unicode
        - ibus-typing-booster
        - ibus-table-chinese
        - ibus-table-chinese-cangjie
        - ibus-table-chinese-quick
        - orca
        - speech-dispatcher
        - brltty
        - braille-printer-app
        - dymo-cups-drivers
        - hplip
        - hplip-common
        - gawk-all-langpacks
        - fedora-bookmarks
        - fedora-chromium-config
        - fedora-chromium-config-kde
        # Handheld & Deck specific bloat (not needed on Desktop/Laptop)
        - gamescope-session-steam
        - gamescope-session-plus
        - jupiter-hw-support-btrfs
        - jupiter-fan-control
        - hhd
        - hhd-ui
        - steam_notif_daemon
        - steamdeck-dsp
        - steamdeck-kde-presets
        # Non-x86 QEMU Emulators (save space, keep x86_64 virtualization)
        - qemu-system-aarch64
        - qemu-system-aarch64-core
        - qemu-system-arm
        - qemu-system-arm-core
        - qemu-system-riscv
        - qemu-system-riscv-core
        - qemu-system-ppc
        - qemu-system-ppc-core
        - qemu-system-s390x
        - qemu-system-s390x-core
        - qemu-system-mips
        - qemu-system-mips-core
        - qemu-system-alpha
        - qemu-system-alpha-core
        - qemu-system-avr
        - qemu-system-avr-core
        - qemu-system-loongarch64
        - qemu-system-loongarch64-core
        - qemu-system-m68k
        - qemu-system-m68k-core
        - qemu-system-microblaze
        - qemu-system-microblaze-core
        - qemu-system-or1k
        - qemu-system-or1k-core
        - qemu-system-rx
        - qemu-system-rx-core
        - qemu-system-sh4
        - qemu-system-sh4-core
        - qemu-system-sparc
        - qemu-system-sparc-core
        - qemu-system-tricore
        - qemu-system-tricore-core
        - qemu-system-xtensa
        - qemu-system-xtensa-core
        - ipxe-roms-qemu
      auto-remove: false
