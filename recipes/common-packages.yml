# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    repos:
      cleanup: true
      copr:
        - bigjapka/VeraCrypt
        - fptbb/fp-appimage-updater
        - komapro/rbw
      files:
        - nordvpn.repo
        - tailscale.repo
        - cloudflare-warp.repo
        - vscode.repo
      keys:
        - https://repo.nordvpn.com/gpg/nordvpn_public.asc
        - https://pkg.cloudflareclient.com/pubkey.gpg
        - https://packages.microsoft.com/keys/microsoft.asc
    install:
      skip-unavailable: true
      skip-broken: true
      packages:
        # Networking & VPNs
        - nordvpn # nordvpn's cli client for linux
        - tailscale # a zero-config vpn and private network tool
        - libpcap # packet capture library for network sniffing tools

        # System Utilities & CLI Enhancement
        - kitty # extremely fast, gpu-accelerated terminal emulator
        - powerline-fonts # patched fonts with powerline symbols

        # Security & Authentication
        - pam-u2f # yubikey and fido u2f authentication for pam
        - libfido2 # fido2 library for u2f support in browsers and other applications
        - fido2-tools # command line tools for fido2 devices
        - gnupg2 # openpgp encryption and signing tools
        - veracrypt # disk encryption software based on truecrypt
        - fuse-encfs # encrypted filesystem support via fuse
        - kleopatra # gpg key manager and certificate manager

        # Development & Image Management
        - buildah # build oci/docker images without needing a daemon
        - fp-appimage-updater # declarative appimage updater
        - upx # ultimate packer for executables (binary compressor)

        # Storage & File Management
        - kde-partitionmanager # gui tool to manage disk partitions
        - dolphin-plugins # dolphin integration for revision control systems, dropbox, and disk images
        - nextcloud-client-dolphin # the nextcloud desktop client dolphin extension

        # Windows Compatibility & Gaming
        - gameconqueror # cheat engine for linux (debug and memory edit)

        # Dotfiles, Automation & Secrets
        - chezmoi # manage your dotfiles across multiple machines
        - age # simple, modern and secure file encryption tool
        - expect # automate interactive applications with scripts
        - rbw # bitwarden cli client for managing secrets in the terminal
  - type: script
    scripts:
      # - whatpulse.sh
      # - opensnitch.sh
      - fido2.sh
      - appimage-updater.sh
      # - install-protonvpn.sh
  - type: systemd
    system:
      enabled:
        - nordvpnd
        - tailscaled
        # - me.proton.vpn.split_tunneling.service
        # - whatpulse-pcap-service
        # - opensnitch