# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    repos:
      copr:
        - avengemedia/dms
    install:
      packages:
        - niri
        - dms
        - cava
        - cliphist
        - wl-clipboard
        - dgop
        - dsearch
        - matugen

        # System related just to make sure
        - qt6-qtmultimedia
        - cups-pk-helper
        - kf6-kwallet
        - pam-kwallet
        - kwalletmanager
        - qt5ct
        - qt6ct
        - kvantum
  - type: script
    scripts:
      - danklinux.sh
