# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    repos:
      cleanup: true
      copr:
        - avengemedia/dms
        - avengemedia/danklinux
    install:
      packages:
        - niri
        - dms
        - cava
        - cliphist
        - wl-clipboard
        - dgop
        - danksearch
        - matugen
        - khal

        # system related just to make sure
        - qt6-qtmultimedia
        - cups-pk-helper
        - kf6-kwallet
        - pam-kwallet
        - kwalletmanager
        - qt5ct
        - qt6ct
        - kvantum
        - xdg-desktop-portal-gtk
        - xdg-desktop-portal-gnome
  - type: script
    scripts:
      - danklinux.sh