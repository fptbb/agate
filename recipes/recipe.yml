---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: agate
description: A custom image of Bazzite for personal needs.

base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  # Common Modules
  - from-file: common-packages.yml
  - from-file: common-flatpaks.yml
  - from-file: common-development.yml
  - from-file: common-bazzite-port.yml
  - from-file: common-windowmanager.yml
  - from-file: common-dotfiles.yml
  - from-file: common-debloat.yml
  - from-file: common-theming.yml

  # Branding Related Modules
  - type: os-release
    properties:
      ID: agate
      VARIANT_ID: agate
      NAME: Agate
      PRETTY_NAME: Agate
      HOME_URL: https://os.fpt.icu
      DEFAULT_HOSTNAME: fp-pc
  - type: script
    scripts:
      - branding.sh

  # Initramfs and Signing
  - type: initramfs
  - type: signing

labels:
  "org.opencontainers.image.title": "Agate"
  "org.opencontainers.image.source": "https://gitlab.com/fpsys/agate"
  "org.opencontainers.image.url": "https://os.fpt.icu/"
  "org.opencontainers.image.documentation": "https://os.fpt.icu/"
  "org.opencontainers.image.description": "A custom image of Bazzite for personal needs."
  "org.opencontainers.image.vendor": "fptbb"
  "org.opencontainers.image.base.name": "quay.io/fptbb/agate:latest"
  "io.artifacthub.package.readme-url": "https://gitlab.com/fpsys/agate/-/raw/main/README.md"
  "io.artifacthub.package.logo-url": "https://gitlab.com/fpsys/agate/-/raw/main/files/system/usr/share/pixmaps/fp-logo.png"
  "io.artifacthub.package.maintainers": '[{\"name\": \"fptbb\", \"email\": \"lucas@fptbb.com\"}]'
  "io.artifacthub.package.prerelease": "false"
  "io.artifacthub.package.keywords": "fp-os, bootc, ostree, ublue, universal-blue, blue-build, agate"
  "io.artifacthub.package.deprecated": "false"
  "io.artifacthub.package.alternative-locations": "ghcr.io/fptbb/agate:latest"
